<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Demo Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Sample Website</p>
      <h1>간단한 데모 웹사이트입니다</h1>
      <p class="hero-copy">
        이 페이지는 빠르게 확인할 수 있는 샘플용 랜딩 페이지입니다.
        기본 레이아웃, 카드 섹션, 버튼 인터랙션을 포함합니다.
      </p>
      <div class="hero-actions">
        <button id="cta-button" class="primary-button">메시지 보기</button>
        <a class="secondary-link" href="#features">구성 보기</a>
      </div>
      <p id="message" class="message" aria-live="polite"></p>
    </section>

    <section id="features" class="features">
      <article class="card">
        <h2>빠른 시작</h2>
        <p>파일 3개만으로 구성되어 바로 열어볼 수 있습니다.</p>
        <p>테스트 중입니다.</p>
        <p>테스트 2.</p>
      </article>
      <article class="card">
        <h2>심플한 구조</h2>
        <p>HTML, CSS, JavaScript를 분리해 수정하기 쉽습니다.</p>
      </article>
      <article class="card">
        <h2>확장 가능</h2>
        <p>이 샘플을 기반으로 섹션이나 기능을 쉽게 추가할 수 있습니다.</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
